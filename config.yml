backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
    - name: "products"
    label: "Products"
    folder: "_products"
    create: true
    slug: "{{slug}}"
    fields:
            - {label: "Product Name", name: "name", widget: "string"}
            - {label: "Description", name: "desc", widget: "string"}
            - {label: "Price", name: "price", widget: "string"}
            - {label: "Image", name: "image", widget: "image"}